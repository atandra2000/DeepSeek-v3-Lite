name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt
      - name: Import checks
        run: |
          python -c "import models.transformer; import models.mla; import models.moe; import models.mtp"
      - name: Run test suite
        run: |
          python -m pytest tests/ -q --tb=short
      - name: Model forward smoke test
        run: |
          python -c "
import torch, yaml
from pathlib import Path
from models.transformer import Transformer
cfg_path = Path('configs/pretrain_a100_422m.yaml')
with open(cfg_path) as f:
    cfg = yaml.safe_load(f)['model']
cfg['max_seq_len'] = 16
model = Transformer(cfg)
x = torch.randint(0, cfg['vocab_size'], (2, 16))
logits = model(x)
assert logits.shape == (2, 16, cfg['vocab_size']), f'unexpected shape {logits.shape}'
print('OK')
"
