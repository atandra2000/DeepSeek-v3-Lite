# configs/pretrain_82m.yaml
# DeepSeek-V3-Lite ~82M param model for RTX 4090 24GB.
# Code-focused, trainable in ~7 hours.

model:
  vocab_size:          14336
  dim:                 640
  n_layers:            12
  n_heads:             10
  n_dense_layers:      2
  n_routed_experts:    8
  n_shared_experts:    1
  n_activated_experts: 2
  inter_dim:           1280
  moe_inter_dim:       320
  kv_lora_rank:        128
  q_lora_rank:         0
  qk_nope_head_dim:    48
  qk_rope_head_dim:    16
  v_head_dim:          64
  max_seq_len:         1024
  rope_theta:          10000
  rope_factor:         1.0
  mscale:              1.0
  mtp_depth:           1
  mtp_loss_weight:     0.3
  dtype:               bf16
  attn_impl:           "sdpa"
  use_grouped:         "stacked"
  weight_tying:        true

training:
  micro_batch_size:              8
  gradient_accumulation_steps:   4
  total_steps:                   36000
  warmup_steps:                  600
  lr:                            8.0e-4
  min_lr_ratio:                  0.05
  weight_decay:                  0.1
  beta1:                         0.9
  beta2:                         0.95
  grad_clip:                     1.0
  grad_checkpoint:               true
  compile:                       true
  save_interval:                 3000
  log_interval:                  50
  mup_lr:                        true
  mup_lr_reference:              6.0e-4
  mup_lr_reference_params:       757226496
  nan_guard:                     true
  nan_guard_max_consecutive:     5
  log_per_component_params:      true
  balance_loss_alpha:            0.0
  bias_update_speed:             0.001
  bias_update_every:             10
  save_dir:                      "checkpoints/pretrain_82m"

data:
  train_data_path:      "data/pretrain_code-82m"
  tokenizer_path:       "deepseek-ai/deepseek-coder-v2-lite"
